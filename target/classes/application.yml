spring:
  application:
    name: chess-platform

  # ─── Database Configuration ─────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:chessdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:1111}
  address: 0.0.0.0

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:chess-platform-super-secret-key-that-is-long-enough-for-hs256-algorithm}
  expiration: ${JWT_EXPIRATION:86400000}

# ─── Management (Actuator) ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ─── Chess Settings ───────────────────────────────────────────────────────────
chess:
  matchmaking:
    timeout-seconds: 60
    check-interval-seconds: 5
  ai:
    max-depth: 4

logging:
  level:
    com.chessplatform: DEBUG
